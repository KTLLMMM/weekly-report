<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iGaming 競品動態｜週報總覽</title>
<meta property="og:type" content="website">
<meta property="og:title" content="iGaming 競品動態｜週報總覽">
<meta property="og:description" content="iGaming 產業競品每週動態與遊戲速報">
<meta property="og:image" content="https://ktllmmm.github.io/weekly-report/logo.png">
<meta property="og:url" content="https://ktllmmm.github.io/weekly-report/igaming/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #8b5cf6;
    --brand-dark: #6d28d9;
    --text: #1a1a1a;
    --muted: #5a6470;
    --line: #e3e8ee;
    --bg: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: "Noto Sans TC", system-ui, "Microsoft JhengHei", sans-serif;
    font-size: 18px; line-height: 1.8; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 800px; margin: 0 auto; padding: 48px 24px 80px; }

  .back-link {
    display: inline-block; color: var(--muted); text-decoration: none;
    font-size: 15px; margin-bottom: 20px;
  }
  .back-link:hover { text-decoration: underline; }
  .back-link::before { content: "← "; }

  header { border-bottom: 3px solid var(--brand); padding-bottom: 16px; margin-bottom: 32px; }
  .head-row { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .head-row img { height: 72px; width: auto; flex-shrink: 0; }
  .head-text { min-width: 0; text-align: right; }
  h1 { font-size: 28px; line-height: 1.4; margin: 0; color: var(--brand-dark); }
  .sub { color: var(--muted); font-size: 16px; margin-top: 6px; }

  /* 區段標題 */
  .section-title {
    font-size: 15px; font-weight: 700; letter-spacing: 1px; color: var(--brand-dark);
    margin: 0 0 14px; padding-left: 12px; border-left: 5px solid var(--brand);
  }
  .section { margin-bottom: 40px; }

  /* 遊戲速報醒目區塊（最新，會被覆蓋） */
  a.flash {
    display: block; text-decoration: none; color: #fff;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    border-radius: 14px; padding: 26px 28px;
    transition: box-shadow .15s, transform .15s;
  }
  a.flash:hover { box-shadow: 0 8px 22px rgba(109,40,217,.30); transform: translateY(-2px); }
  .flash .badge {
    display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: 1px;
    background: rgba(255,255,255,.22); padding: 3px 10px; border-radius: 999px; margin-bottom: 12px;
  }
  .flash .flash-title { font-size: 22px; font-weight: 700; line-height: 1.4; }
  .flash .flash-desc { font-size: 15px; opacity: .92; margin-top: 6px; }
  .flash .go { font-size: 14px; font-weight: 700; margin-top: 16px; }
  .flash .go::after { content: " →"; }

  /* 週報卡片列表 */
  a.report {
    display: block; text-decoration: none; color: inherit;
    border: 1px solid var(--line); border-radius: 10px;
    padding: 20px 22px; margin: 0 0 16px;
    transition: border-color .15s, box-shadow .15s, transform .15s;
  }
  a.report:hover {
    border-color: var(--brand);
    box-shadow: 0 4px 14px rgba(139,92,246,.15);
    transform: translateY(-1px);
  }
  .report .meta {
    font-size: 14px; font-weight: 700; letter-spacing: .5px;
    color: var(--brand); margin-bottom: 6px;
  }
  .report .lead { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.5; }
  .report .go { font-size: 14px; color: var(--muted); margin-top: 8px; }
  .report .go::after { content: " →"; }

  footer {
    margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--line);
    color: var(--muted); font-size: 14px;
  }

  @media (max-width: 600px) {
    body { font-size: 17px; }
    .wrap { padding: 32px 18px 60px; }
    .head-row { flex-direction: column; align-items: flex-start; gap: 14px; }
    .head-row img { height: 56px; }
    .head-text { text-align: left; }
    h1 { font-size: 24px; }
    .flash .flash-title { font-size: 20px; }
    .report .lead { font-size: 17px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <a class="back-link" href="../">競品動態週報總覽</a>

  <header>
    <div class="head-row">
      <img src="../logo.png" alt="傳奇亞太科技 ALPHABET">
      <div class="head-text">
        <h1>iGaming 競品動態</h1>
        <div class="sub">遊戲速報與每週週報</div>
      </div>
    </div>
  </header>

  <!-- ===== 遊戲速報：永遠只放最新一期，由同事提供 HTML，覆蓋 /igaming/flash/index.html ===== -->
  <div class="section">
    <p class="section-title">遊戲速報</p>
    <a class="flash" href="flash/">
      <span class="badge">最新</span>
      <div class="flash-title">iGaming 遊戲速報</div>
      <div class="flash-desc">最新遊戲上市與榜單動態，隨時更新、只看最新一期。</div>
      <div class="go">看最新速報</div>
    </a>
  </div>

  <!-- ===== 每週週報：保留歷史，最新的放最上面，每週新增一張 a.report ===== -->
  <div class="section">
    <p class="section-title">每週週報</p>

    <a class="report" href="weeks/W23/">
      <div class="meta">第 23 週 ｜ 2026/05/25 – 06/01</div>
      <div class="lead">Bingo Plus 單週 7 成換血，JILI 以新作汰換舊作</div>
      <div class="go">閱讀本週週報</div>
    </a>
  </div>

  <footer>
    © 2026 傳奇亞太科技有限公司 ALPHABET ｜ iGaming 競品動態
  </footer>

</div>
</body>
</html>
