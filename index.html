<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANDBASE 競品動態｜週報總覽</title>
<meta property="og:type" content="website">
<meta property="og:title" content="LANDBASE 競品動態｜週報總覽">
<meta property="og:description" content="SLOT 產業競品每週動態彙整">
<meta property="og:image" content="https://ktllmmm.github.io/weekly-report/logo.png">
<meta property="og:url" content="https://ktllmmm.github.io/weekly-report/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #24b4cc;
    --brand-dark: #167d91;
    --text: #1a1a1a;
    --muted: #5a6470;
    --line: #e3e8ee;
    --bg: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: "Noto Sans TC", system-ui, "Microsoft JhengHei", sans-serif;
    font-size: 18px; line-height: 1.8; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 800px; margin: 0 auto; padding: 48px 24px 80px; }

  header { border-bottom: 3px solid var(--brand); padding-bottom: 16px; margin-bottom: 32px; }
  .head-row { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .head-row img { height: 72px; width: auto; flex-shrink: 0; }
  .head-text { min-width: 0; text-align: right; }
  h1 { font-size: 28px; line-height: 1.4; margin: 0; color: var(--brand-dark); }
  .sub { color: var(--muted); font-size: 16px; margin-top: 6px; }

  .intro { color: var(--muted); margin: 0 0 28px; }

  /* 週報卡片列表 */
  a.report {
    display: block; text-decoration: none; color: inherit;
    border: 1px solid var(--line); border-radius: 10px;
    padding: 20px 22px; margin: 0 0 16px;
    transition: border-color .15s, box-shadow .15s, transform .15s;
  }
  a.report:hover {
    border-color: var(--brand);
    box-shadow: 0 4px 14px rgba(36,180,204,.15);
    transform: translateY(-1px);
  }
  .report .meta {
    font-size: 14px; font-weight: 700; letter-spacing: .5px;
    color: var(--brand); margin-bottom: 6px;
  }
  .report .lead { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.5; }
  .report .go { font-size: 14px; color: var(--muted); margin-top: 8px; }
  .report .go::after { content: " →"; }

  footer {
    margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--line);
    color: var(--muted); font-size: 14px;
  }

  @media (max-width: 600px) {
    body { font-size: 17px; }
    .wrap { padding: 32px 18px 60px; }
    .head-row { flex-direction: column; align-items: flex-start; gap: 14px; }
    .head-row img { height: 56px; }
    .head-text { text-align: left; }
    h1 { font-size: 24px; }
    .report .lead { font-size: 17px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="head-row">
      <img src="logo.png" alt="傳奇亞太科技 ALPHABET">
      <div class="head-text">
        <h1>LANDBASE 競品動態</h1>
        <div class="sub">週報總覽</div>
      </div>
    </div>
  </header>

  <p class="intro">SLOT 產業競品每週動態彙整。點擊任一週進入完整週報。</p>

  <!-- 週報列表：最新的放最上面；每新增一週，複製一個 a.report 區塊即可 -->
  <a class="report" href="weeks/W22/">
    <div class="meta">第 22 週 ｜ 2026/05/25 – 05/31</div>
    <div class="lead">Aristocrat 新機首發奪冠 Eilers &amp; Krejcik、Light &amp; Wonder 11 款遊戲攻占排行榜、IGT 重整後取得 UAE 執照布局中東</div>
    <div class="go">閱讀本週週報</div>
  </a>

  <footer>
    © 2026 傳奇亞太科技有限公司 ALPHABET ｜ LANDBASE 競品動態
  </footer>

</div>
</body>
</html>
